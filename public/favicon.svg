<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#a855f7"/>

  <!-- Running figure -->
  <!-- Head -->
  <circle cx="20" cy="7.5" r="2.2" fill="white"/>

  <!-- Body / torso line -->
  <line x1="19" y1="9.5" x2="16" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Left arm (swinging back) -->
  <line x1="18.5" y1="11.5" x2="22.5" y2="14" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Right arm (swinging forward) -->
  <line x1="17.5" y1="12.5" x2="13.5" y2="11" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Left leg (stride back) -->
  <line x1="16" y1="16" x2="19.5" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="19.5" y1="21" x2="22.5" y2="23.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Right leg (stride forward) -->
  <line x1="16" y1="16" x2="13" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="21" x2="10" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Speed lines -->
  <line x1="6" y1="14" x2="10" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="5" y1="17" x2="9" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="6.5" y1="20" x2="10" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
